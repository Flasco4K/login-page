<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Login Page</title>
  </head>
  <body>
    <div class="container" id="container">

      <div class="form-container sign-up">
        <form>
          <h1>Create Account</h1>
          <div class="social-icons">
            <a href="#" class="icon"
              ><i class="fa-brands fa-google-plus-g"></i
            ></a>
            <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="icon"
              ><i class="fa-brands fa-github"></i></i
            ></a>
            <a href="#" class="icon"
              ><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
          <span>veya kayıt için e-postanızı kullanın</span>
          <input type="text" placeholder="Kullanıcı Adı">
          <input type="email" placeholder="Email">
          <input type="password" placeholder="Şifre">
          <button>Kayıt Ol</button>
        </form>
      </div>

      <div class="form-container sign-in">
        <form>
          <h1>Giriş Yap</h1>
          <div class="social-icons">
            <a href="#" class="icon"
              ><i class="fa-brands fa-google-plus-g"></i
            ></a>
            <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="icon"
              ><i class="fa-brands fa-github"></i></i
            ></a>
            <a href="#" class="icon"
              ><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
          <span>veya kayıt için şifrenizi kullanın</span>
          <input type="email" placeholder="Email">
          <input type="password" placeholder="Şifre">
          <button>Giriş Yap</button>
        </form>
      </div>

      <div class="toggle-container">
        <div class="toggle">
          <div class="toggle-panel toggle-left">
            <h1>Hoşgeldiniz!</h1>
            <p>Sitenin tüm özelliklerini kullanabilmek için lütfen kişisel bilgilerinizi giriniz!</p>
            <button class="hidden" id="login">Giriş Yap</button>
          </div>
          <div class="toggle-panel toggle-right">
            <h1>Hoşgeldiniz!</h1>
            <p>Sitenin tüm özelliklerini kullanabilmek için lütfen kayıt olun!</p>
            <button class="hidden" id="register">Kayıt Ol</button>
          </div>
        </div>
      </div>

    </div>
    <script src="script.js"></script>
  </body>
</html>
